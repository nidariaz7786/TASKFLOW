<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Profile | TaskFlow</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="style.css">

</head>

<body id="profile-page">


    <nav class="navbar navbar-expand-lg navbar-dark fixed-top shadow">

        <div class="container">

            <a class="navbar-brand fw-bold fs-3" href="index.html">

                <i class="fa-solid fa-list-check"></i>

                TaskFlow

            </a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbar">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="navbar">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">Dashboard</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="completed.html">Completed</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="profile.html">Profile</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="setting.html">Settings</a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>


    <section class="profile-section mt-5 pt-5">

        <div class="container">

            <div class="row">

                <!-- Left -->

                <div class="col-lg-4">

                    <div class="card shadow border-0 profile-card">

                        <div class="card-body text-center">

                            <img src="image/image11.jpg" alt="Profile Image"
                            " class="rounded-circle img-fluid profile-image">

                            <h3 class="mt-3">

                                Student

                            </h3>

                            <p class="text-muted">

                                TaskFlow User

                            </p>

                            <button class="btn btn-primary w-100">

                                <i class="fa-solid fa-user-pen"></i>

                                Edit Profile

                            </button>

                        </div>

                    </div>

                </div>


                <div class="col-lg-8">

                    <div class="card shadow border-0">

                        <div class="card-body">

                            <h3 class="mb-4">

                                Your Statistics

                            </h3>

                            <div class="row g-4">

                                <div class="col-md-6">

                                    <div class="stats-card">

                                        <h6>Total Tasks</h6>

                                        <h2 id="profileTotal">

                                            0

                                        </h2>

                                    </div>

                                </div>

                                <div class="col-md-6">

                                    <div class="stats-card">

                                        <h6>Completed</h6>

                                        <h2 id="profileCompleted">

                                            0

                                        </h2>

                                    </div>

                                </div>

                                <div class="col-md-6">

                                    <div class="stats-card">

                                        <h6>Pending</h6>

                                        <h2 id="profilePending">

                                            0

                                        </h2>

                                    </div>

                                </div>

                                <div class="col-md-6">

                                    <div class="stats-card">

                                        <h6>Completion</h6>

                                        <h2 id="profilePercent">

                                            0%

                                        </h2>

                                    </div>

                                </div>

                            </div>

                        </div>

                    </div>


                    <div class="card shadow border-0 mt-4">

                        <div class="card-body">

                            <h3>

                                Achievements

                            </h3>

                            <hr>

                            <div class="row text-center">

                                <div class="col-md-4">

                                    <i class="fa-solid fa-star fa-3x text-warning"></i>

                                    <h5 class="mt-3">

                                        Beginner

                                    </h5>

                                </div>

                                <div class="col-md-4">

                                    <i class="fa-solid fa-fire fa-3x text-danger"></i>

                                    <h5 class="mt-3">

                                        Productivity

                                    </h5>

                                </div>

                                <div class="col-md-4">

                                    <i class="fa-solid fa-trophy fa-3x text-success"></i>

                                    <h5 class="mt-3">

                                        Goal Achiever

                                    </h5>

                                </div>

                            </div>

                        </div>

                    </div>


                    <div class="card shadow border-0 mt-4">

                        <div class="card-body">

                            <h3>

                                Recent Activity

                            </h3>

                            <hr>

                            <ul class="list-group" id="recentActivity">

                                <!-- JS -->

                            </ul>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </section>


    <footer class="text-center py-4 mt-5">

        <p>

            © 2026 TaskFlow | Profile

        </p>

    </footer>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


    <script src="script.js"></script>

</body>

</html>
