<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | TaskFlow</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>


    <nav class="navbar navbar-expand-lg navbar-dark fixed-top shadow">

        <div class="container">

            <a class="navbar-brand fw-bold fs-3" href="index.html">
                <i class="fa-solid fa-list-check"></i> TaskFlow
            </a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbar">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbar">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link active" href="dashboard.html">Dashboard</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="completed.html">Completed</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="profile.html">Profile</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="setting.html">Settings</a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>


    <section class="dashboard mt-5 pt-5">

        <div class="container">

            <h2 class="fw-bold mb-4">
                Dashboard
            </h2>

            <!-- Statistics -->

            <div class="row g-4 mb-5">

                <div class="col-lg-3 col-md-6">

                    <div class="stats-card">

                        <h5>Total Tasks</h5>

                        <h2 id="totalTasks">0</h2>

                    </div>

                </div>

                <div class="col-lg-3 col-md-6">

                    <div class="stats-card">

                        <h5>Completed</h5>

                        <h2 id="completedTasks">0</h2>

                    </div>

                </div>

                <div class="col-lg-3 col-md-6">

                    <div class="stats-card">

                        <h5>Pending</h5>

                        <h2 id="pendingTasks">0</h2>

                    </div>

                </div>

                <div class="col-lg-3 col-md-6">

                    <div class="stats-card">

                        <h5>Completion</h5>

                        <h2 id="completionRate">0%</h2>

                    </div>

                </div>

            </div>

            <div class="mb-5">

                <label class="fw-bold mb-2">

                    Progress

                </label>

                <div class="progress">

                    <div class="progress-bar bg-success" id="progressBar" style="width:0%;">

                        0%

                    </div>

                </div>

            </div>


            <div class="row mb-4">

                <div class="col-md-6">

                    <input type="text" class="form-control" id="searchTask" placeholder="Search Task...">

                </div>

                <div class="col-md-3">

                    <select class="form-select" id="filterStatus">

                        <option value="all">

                            All Tasks

                        </option>

                        <option value="pending">

                            Pending

                        </option>

                        <option value="completed">

                            Completed

                        </option>

                    </select>

                </div>

                <div class="col-md-3">

                    <select class="form-select" id="sortTasks">

                        <option value="new">

                            Newest

                        </option>

                        <option value="old">

                            Oldest

                        </option>

                        <option value="priority">

                            Priority

                        </option>

                    </select>

                </div>

            </div>


            <div class="card shadow border-0">

                <div class="card-header bg-primary text-white">

                    <h4>

                        Add New Task

                    </h4>

                </div>

                <div class="card-body">

                    <form id="taskForm">

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label>

                                    Task Title

                                </label>

                                <input type="text" id="taskTitle" class="form-control" required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label>

                                    Category

                                </label>

                                <select id="taskCategory" class="form-select">

                                    <option>

                                        Study

                                    </option>

                                    <option>

                                        Work

                                    </option>

                                    <option>

                                        Personal

                                    </option>

                                    <option>

                                        Shopping

                                    </option>

                                    <option>

                                        Fitness

                                    </option>

                                </select>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label>

                                    Priority

                                </label>

                                <select id="taskPriority" class="form-select">

                                    <option>

                                        High

                                    </option>

                                    <option>

                                        Medium

                                    </option>

                                    <option>

                                        Low

                                    </option>

                                </select>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label>

                                    Due Date

                                </label>

                                <input type="date" id="taskDate" class="form-control">

                            </div>

                            <div class="col-12 mb-3">

                                <label>

                                    Description

                                </label>

                                <textarea id="taskDescription" rows="3" class="form-control">

</textarea>

                            </div>

                            <div class="col-12">

                                <button class="btn btn-primary" type="submit">

                                    <i class="fa-solid fa-plus"></i>

                                    Add Task

                                </button>

                            </div>

                        </div>

                    </form>

                </div>

            </div>

            <!-- Task List -->

            <div class="mt-5">

                <h3 class="mb-4">

                    My Tasks

                </h3>

                <div id="taskList" class="row g-4">


                </div>

            </div>

        </div>

    </section>

    <!-- Footer -->

    <footer class="text-center py-4 mt-5">

        <p>

            © 2026 TaskFlow | Dashboard

        </p>

    </footer>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    

    <script src="script.js"></script>

</body>

</html>
